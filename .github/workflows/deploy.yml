name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag trading-grid:latest

      - name: Log in to Docker registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Tag Docker image for registry
        run: docker tag trading-grid:latest ${{ secrets.REGISTRY_URL }}/trading-grid:latest

      - name: Push Docker image to registry
        run: docker push ${{ secrets.REGISTRY_URL }}/trading-grid:latest

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build]
    concurrency:
      group: trading-grid-prod
      cancel-in-progress: true
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          port: ${{ secrets.PROD_PORT }}
          password: "${{ secrets.PROD_PASSWORD }}"
          script: "cd ~/services/trading-grid && ./deploy.sh"
