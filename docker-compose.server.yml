version: '3.9'

services:
  grid-bot:
    image: registry.saillardq.fr/trading-grid:latest
    container_name: trading-grid-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - STATE_FILE=/app/data/bot_state.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
